<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Facial Aesthetic Report</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:#f5f5f7;
    color:#1d1d1f;
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.card{
    background:white;
    border-radius:20px;
    padding:35px;
    margin-bottom:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h2{
    margin-top:0;
}

input,select{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    background:black;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

textarea{
    width:100%;
    height:300px;
    border-radius:15px;
    padding:20px;
    box-sizing:border-box;
    border:1px solid #ddd;
}

.footer{
    text-align:center;
    color:#777;
    font-size:14px;
}

</style>
</head>
<body>

<h1>Premium Facial Aesthetic Report</h1>

<div class="subtitle">
Analisi estetica professionale del volto.
</div>

<div class="card">

<h2>Informazioni del soggetto</h2>

<select id="sesso">
<option>Maschio</option>
<option>Femmina</option>
</select>

<input id="eta" placeholder="Età">

<input id="altezza" placeholder="Altezza (cm)">

<input id="peso" placeholder="Peso (kg)">

<input id="occhi" placeholder="Colore occhi">

<input id="capelli" placeholder="Colore capelli">

<input id="occhiali" placeholder="Occhiali (sì/no)">

<input id="fumo" placeholder="Fumatore (sì/no)">

<input id="sport" placeholder="Attività fisica">

<button onclick="generaPrompt()">
Genera Prompt
</button>

</div>

<div class="card">

<h2>Prompt generato</h2>

<textarea id="prompt"></textarea>

</div>

<div class="footer">
Le valutazioni sono puramente orientative e non sostituiscono una consulenza medica.
</div>

<script>

function generaPrompt(){

let sesso=document.getElementById("sesso").value;
let eta=document.getElementById("eta").value;
let altezza=document.getElementById("altezza").value;
let peso=document.getElementById("peso").value;
let occhi=document.getElementById("occhi").value;
let capelli=document.getElementById("capelli").value;
let occhiali=document.getElementById("occhiali").value;
let fumo=document.getElementById("fumo").value;
let sport=document.getElementById("sport").value;

document.getElementById("prompt").value=
`INFORMAZIONI DEL SOGGETTO

Sesso: ${sesso}
Età: ${eta}
Altezza: ${altezza}
Peso: ${peso}
Occhi: ${occhi}
Capelli: ${capelli}
Occhiali: ${occhiali}
Fumatore: ${fumo}
Attività fisica: ${sport}

Crea un report estetico premium del volto basato sulle foto caricate...`;

}

</script>

</body>
</html>
